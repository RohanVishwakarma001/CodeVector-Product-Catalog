services:
  - type: web
    name: codevector-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true
